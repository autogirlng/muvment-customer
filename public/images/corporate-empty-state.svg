<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 400" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="corpGlow" x1="220" y1="60" x2="220" y2="380" gradientUnits="userSpaceOnUse">
      <stop stop-color="#CFE5FF"/>
      <stop offset="1" stop-color="#E8F2FC"/>
    </linearGradient>
    <filter id="corpSoft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- backdrop circle -->
  <ellipse cx="230" cy="210" rx="185" ry="165" fill="url(#corpGlow)" opacity=".95"/>
  <!-- clouds -->
  <ellipse cx="120" cy="95" rx="38" ry="22" fill="#fff" opacity=".9"/>
  <ellipse cx="150" cy="92" rx="28" ry="18" fill="#fff" opacity=".85"/>
  <ellipse cx="320" cy="88" rx="40" ry="24" fill="#fff" opacity=".88"/>
  <ellipse cx="355" cy="85" rx="26" ry="16" fill="#fff" opacity=".82"/>
  <!-- distant buildings -->
  <rect x="88" y="175" width="42" height="95" rx="6" fill="#fff" filter="url(#corpSoft)" opacity=".95"/>
  <rect x="94" y="188" width="10" height="14" rx="2" fill="#B8D9FF"/>
  <rect x="108" y="188" width="10" height="14" rx="2" fill="#B8D9FF"/>
  <rect x="94" y="208" width="10" height="14" rx="2" fill="#B8D9FF"/>
  <rect x="108" y="208" width="10" height="14" rx="2" fill="#B8D9FF"/>
  <rect x="340" y="165" width="48" height="108" rx="8" fill="#fff" filter="url(#corpSoft)" opacity=".92"/>
  <rect x="348" y="178" width="11" height="15" rx="2" fill="#B8D9FF"/>
  <rect x="364" y="178" width="11" height="15" rx="2" fill="#B8D9FF"/>
  <rect x="380" y="178" width="11" height="15" rx="2" fill="#B8D9FF"/>
  <!-- trees -->
  <ellipse cx="75" cy="258" rx="14" ry="18" fill="#7DCF9B"/>
  <rect x="72" y="268" width="6" height="22" rx="2" fill="#6BB68A"/>
  <ellipse cx="392" cy="248" rx="12" ry="16" fill="#7DCF9B"/>
  <rect x="389" y="256" width="6" height="20" rx="2" fill="#6BB68A"/>
  <!-- shield -->
  <path d="M118 175 L118 228 Q118 258 158 278 Q198 258 198 228 L198 175 Q158 158 118 175Z" fill="#0066FF"/>
  <path d="M146 212 L156 224 L174 198" stroke="#fff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- briefcase -->
  <rect x="318" y="218" width="78" height="58" rx="10" fill="#0066FF"/>
  <rect x="348" y="206" width="18" height="16" rx="4" fill="#0052CC"/>
  <rect x="332" y="236" width="50" height="28" rx="4" fill="#2484FF"/>
  <!-- main white card -->
  <rect x="155" y="138" width="178" height="208" rx="22" fill="#fff" stroke="#E8EEF4" stroke-width="2"/>
  <circle cx="196" cy="185" r="22" fill="#0066FF"/>
  <path d="M196 172 v26 M185 185 h22" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
  <circle cx="196" cy="185" r="10" stroke="#fff" stroke-width="3" fill="none"/>
  <rect x="232" y="168" width="78" height="10" rx="3" fill="#E9EEF3"/>
  <rect x="232" y="188" width="62" height="10" rx="3" fill="#E9EEF3"/>
  <rect x="232" y="208" width="70" height="10" rx="3" fill="#E9EEF3"/>
  <!-- mini bar chart on card -->
  <rect x="182" y="268" width="18" height="36" rx="4" fill="#0066FF" opacity=".35"/>
  <rect x="206" y="252" width="18" height="52" rx="4" fill="#0066FF" opacity=".55"/>
  <rect x="230" y="260" width="18" height="44" rx="4" fill="#0066FF" opacity=".75"/>
  <rect x="254" y="242" width="18" height="62" rx="4" fill="#0066FF"/>
  <!-- floating cube / network -->
  <g transform="rotate(-14 280 332)">
    <rect x="258" y="302" width="44" height="44" rx="8" fill="#fff" stroke="#D8E4EE" stroke-width="2"/>
    <circle cx="278" cy="318" r="4" fill="#0066FF"/>
    <circle cx="296" cy="328" r="4" fill="#0066FF"/>
    <circle cx="284" cy="334" r="4" fill="#0066FF"/>
    <path d="M278 318 L296 328 M278 318 L284 334 M296 328 L284 334" stroke="#0066FF" stroke-width="2.5" stroke-linecap="round"/>
  </g>
</svg>
